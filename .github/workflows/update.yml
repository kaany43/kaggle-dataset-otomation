name: Update Kaggle Dataset

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      new_dataset:
        description: "Create a new dataset instead of creating a new version"
        required: false
        default: false
        type: boolean
      version_notes:
        description: "Optional custom Kaggle version notes"
        required: false
        default: ""
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Validate required secrets
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_DATASET_SLUG: ${{ secrets.KAGGLE_DATASET_SLUG }}
        run: |
          test -n "$KAGGLE_USERNAME" || { echo "Missing secret: KAGGLE_USERNAME"; exit 1; }
          test -n "$KAGGLE_KEY" || { echo "Missing secret: KAGGLE_KEY"; exit 1; }
          test -n "$KAGGLE_DATASET_SLUG" || { echo "Missing secret: KAGGLE_DATASET_SLUG"; exit 1; }

      - name: Run data collection and upload
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_DATASET_SLUG: ${{ secrets.KAGGLE_DATASET_SLUG }}
          NEW_DATASET: ${{ github.event.inputs.new_dataset || 'false' }}
          VERSION_NOTES: ${{ github.event.inputs.version_notes || '' }}
        run: |
          CMD=(python auto.py)
          if [[ "$NEW_DATASET" == "true" ]]; then
            CMD+=(--new-dataset)
          fi
          if [[ -n "$VERSION_NOTES" ]]; then
            CMD+=(--version-notes "$VERSION_NOTES")
          fi
          "${CMD[@]}"
